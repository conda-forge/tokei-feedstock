{% set version = "14.0.0" %}

package:
  name: tokei
  version: {{ version }}

source:
  url: https://github.com/XAMPPRocky/tokei/archive/v{{ version }}.tar.gz
  sha256: 4e561dbb83ef1b46359714fc623fd45eddfb14821ece63a219470500fdd1cd26

build:
  number: 0

requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('rust') }}
    - {{ stdlib("c") }}
    - cargo-bundle-licenses

test:
  commands:
    - tokei && tokei --help

about:
  home: https://tokei.rs
  license: MIT
  summary: |
    Tokei is a program that displays statistics about your code. Tokei will show
    the number of files, total lines within those files and code, comments, and
    blanks grouped by language.
  dev_url: https://github.com/XAMPPRocky/tokei
  doc_url: https://github.com/XAMPPRocky/tokei#how-to-use-tokei
  license_file:
    - LICENCE-MIT
    - THIRDPARTY.yml

extra:
  recipe-maintainers:
    - dbast
